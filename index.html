<html lang="en">

  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0d0108;
    color:#fff;
    font-family:'Outfit',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    overflow-x:hidden;
  }

  /* animated background grid - subtle pink tint */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      linear-gradient(rgba(238,9,121,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(238,9,121,.04) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
    z-index:0;
  }

  .page {
    position:relative; z-index:1;
    width:100%; max-width:420px;

    display:flex; flex-direction:column;

  /* ── TOP BADGE ── */
  .top-badge {
    background: linear-gradient(135deg,#ee0979,#ff6a00);
    border-radius:30px;
    padding:5px 16px;
    font-size:.72rem;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    box-shadow:0 0 18px rgba(238,9,121,.4);
    animation:badge-pulse 2s ease-in-out infinite;
  }
  @keyframes badge-pulse{
    0%,100%{box-shadow:0 0 18px rgba(238,9,121,.4)}

  }

  /* ── Heading ── */
  .heading { text-align:center; line-height:1.08; }
  .heading h1 {
    font-size:clamp(2rem,8.5vw,2.9rem);

    background-clip:text;

  .heading .accent {

    -webkit-text-fill-color:transparent;

  .bar:nth-child(3){height:8px;animation-delay:.4s}
  .bar:nth-child(4){height:15px;animation-delay:.1s}
  .bar:nth-child(5){height:10px;animation-delay:.3s}
  @keyframes pulse-bar{0%,100%{opacity:1;transform:scaleY(1)}50%{opacity:.45;transform:scaleY(.55)}}
  .live-count { text-align:right; }
  .live-count .number {

    15%  { transform:translateY(-9px) scale(1.04,.97); }

    60%  { transform:translateY(1px)  scale(.99,1.01); }

    90%  { transform:translateY(0)    scale(1); }
    100% { transform:translateY(0)    scale(1); }

  .avatar-live {

    z-index:2; background:rgba(0,0,0,.88);

  .gender-btn:hover,.gender-btn.active {

  /* ── Floating CTA ── */
  .cta-wrap {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    width:calc(100% - 28px); max-width:392px; z-index:999;
    text-decoration:none; display:block;
  }
  .cta-float {
    width:100%;
    background:linear-gradient(135deg,#ee0979,#ff6a00,#ee0979);

    animation:cta-shine 1.4s ease-in-out infinite;
  }
  @keyframes cta-shine {
    0%   { background-position:0% center;   box-shadow:0 0 20px rgba(238,9,121,.5); }

    100% { background-position:0% center;   box-shadow:0 0 20px rgba(238,9,121,.5); }
  }
  .cta-float:active { transform:scale(.97); }
</style>
